<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CultivaTech — Portail ONG</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --vert:#1A5319;--vert2:#2E9E45;--vert-pale:#DCEEDC;--vert-bg:#F1F6F1;
    --side:#0F2413;--side-hover:#1A3A1E;--side-text:#A8C4A8;
    --or:#C8A84B;--bg:#F4F6F4;--card:#FFFFFF;
    --border:#E3E9E3;--text:#17281A;--muted:#64796A;
    --red:#C0392B;--amber:#D68910;--blue:#2471A3;--purple:#7D3C98;
    --shadow:0 1px 2px rgba(23,40,26,.05),0 1px 3px rgba(23,40,26,.04);
    --shadow-lg:0 4px 16px rgba(23,40,26,.09);
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
  .icon{width:17px;height:17px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round;vertical-align:-3px}
  /* LOGIN */
  #loginScreen{position:fixed;inset:0;z-index:1000;background:linear-gradient(150deg,#081708 0%,#0F2413 45%,#17381B 100%);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .login-orbs{position:absolute;inset:0;pointer-events:none}
  .login-orbs::before{content:'';position:absolute;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(46,158,69,.08) 0%,transparent 70%);top:-80px;right:-80px}
  .login-orbs::after{content:'';position:absolute;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(200,168,75,.05) 0%,transparent 70%);bottom:-60px;left:-60px}
  .login-card{position:relative;background:rgba(255,255,255,.05);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,.10);border-radius:20px;padding:48px 44px;width:410px;text-align:center;box-shadow:0 20px 64px rgba(0,0,0,.45)}
  .login-logo-wrap{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
  .login-logo{font-family:'Playfair Display',serif;font-size:26px;color:#fff;letter-spacing:-.5px}
  .login-leaf{font-size:26px}
  .login-sub{color:rgba(255,255,255,.38);font-size:12px;letter-spacing:.3px;margin-bottom:8px}
  .login-divider{width:36px;height:1px;background:rgba(46,158,69,.45);margin:14px auto 18px}
  .login-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(46,158,69,.15);border:1px solid rgba(46,158,69,.3);color:rgba(140,210,150,.95);font-size:11px;font-weight:600;padding:6px 16px;border-radius:18px;margin-bottom:26px;letter-spacing:.7px;text-transform:uppercase}
  .login-label{font-size:11px;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;text-align:left}
  .login-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.11);border-radius:10px;padding:13px 16px;color:#fff;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:10px;transition:all .2s}
  .login-input::placeholder{color:rgba(255,255,255,.26)}
  .login-input:focus{border-color:rgba(46,158,69,.55);background:rgba(255,255,255,.08);box-shadow:0 0 0 3px rgba(46,158,69,.08)}
  .login-btn{width:100%;background:#2E9E45;border:none;border-radius:10px;padding:14px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;margin-top:4px;letter-spacing:.2px}
  .login-btn:hover{background:#278B3C}
  .login-btn:disabled{opacity:.5;cursor:not-allowed}
  .login-error{color:#ff8a80;font-size:12px;margin-top:10px;min-height:18px}
  /* ── LAYOUT : SIDEBAR + MAIN ─────────────────────────────────────── */
  #app{display:none;min-height:100vh}
  #app.on{display:flex}
  .sidebar{width:224px;min-width:224px;background:var(--side);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .side-logo{display:flex;align-items:center;gap:9px;padding:22px 20px 18px;color:#fff}
  .side-logo .lg-name{font-family:'Playfair Display',serif;font-size:17px;letter-spacing:-.2px}
  .side-logo .lg-tag{display:block;font-size:9.5px;color:var(--side-text);letter-spacing:.9px;text-transform:uppercase;margin-top:1px}
  .side-sep{height:1px;background:rgba(255,255,255,.07);margin:0 16px 10px}
  .tab-bar{display:flex;flex-direction:column;gap:2px;padding:0 10px;flex:1}
  .tab-btn{display:flex;align-items:center;gap:11px;background:none;border:none;border-radius:8px;padding:10px 12px;font-size:13px;font-weight:500;color:var(--side-text);cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s,color .15s;text-align:left;white-space:nowrap}
  .tab-btn .icon{width:16px;height:16px;opacity:.85}
  .tab-btn:hover{background:var(--side-hover);color:#fff}
  .tab-btn.active{background:#2E9E45;color:#fff;font-weight:600}
  .side-user{padding:14px 16px 18px;border-top:1px solid rgba(255,255,255,.07)}
  .side-user .su-name{color:#fff;font-size:12.5px;font-weight:600;margin-bottom:2px}
  .side-user .su-org{color:var(--side-text);font-size:11px;margin-bottom:10px}
  .side-user button{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:7px;padding:7px;color:var(--side-text);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
  .side-user button:hover{background:rgba(192,57,43,.18);border-color:rgba(192,57,43,.4);color:#ffb3ab}
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  /* TOPBAR */
  .topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);min-height:56px;padding:8px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .topbar-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .topbar-role{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:16px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
  .badge-ong{background:#E7F3E8;color:var(--vert);border:1px solid #C4E0C7}
  .topbar-name{font-size:13px;color:var(--muted);font-weight:500}
  .topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .topbar-region{font-size:12px;color:var(--muted);background:var(--vert-bg);border:1px solid var(--border);padding:5px 11px;border-radius:16px;font-weight:500}
  .select-pill{border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12.5px;font-family:'DM Sans',sans-serif;outline:none;color:var(--text);background:#fff;cursor:pointer;font-weight:500;transition:border-color .15s}
  .select-pill:hover,.select-pill:focus{border-color:var(--vert2)}
  .refresh-btn{background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:12.5px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
  .refresh-btn:hover{border-color:var(--vert2);color:var(--vert)}
  .logout-btn{display:none}
  /* CONTENT */
  .content{padding:26px 28px 40px;max-width:1420px;width:100%;margin:0 auto}
  .page-header{margin-bottom:20px}
  .section-title{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.3px;margin-bottom:3px}
  .section-sub{font-size:12.5px;color:var(--muted)}
  .subsection-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;margin:26px 0 12px;display:flex;align-items:center;gap:8px}
  .subsection-label::after{content:'';flex:1;height:1px;background:var(--border)}
  /* KPI */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:12px;margin-bottom:22px}
  .kpi-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:6px;position:relative}
  .kpi-icon{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:8px;background:var(--vert-bg);color:var(--vert2);display:flex;align-items:center;justify-content:center;font-size:15px}
  .kpi-card.kpi-blue  .kpi-icon{background:#EBF3F9;color:var(--blue)}
  .kpi-card.kpi-amber .kpi-icon{background:#FCF4E6;color:var(--amber)}
  .kpi-card.kpi-purple .kpi-icon{background:#F5EDF8;color:var(--purple)}
  .kpi-card.kpi-red   .kpi-icon{background:#FBEDEB;color:var(--red)}
  .kpi-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding-right:36px;line-height:1.35;order:-1}
  .kpi-value{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-1px;line-height:1.1;font-variant-numeric:tabular-nums}
  .kpi-delta{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;width:fit-content;padding:2px 8px;border-radius:10px}
  .kpi-delta.up{background:#E7F3E8;color:#1B7A2E}
  .kpi-delta.down{background:#FBEDEB;color:var(--red)}
  .kpi-delta.flat{background:#F1F3F1;color:var(--muted)}
  /* CHARTS */
  .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
  .charts-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px}
  .chart-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px 22px;box-shadow:var(--shadow)}
  .chart-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:7px}
  .chart-wrap{position:relative;height:250px}
  /* BANNERS */
  .alerte-strip{background:#FDF1EF;border:1px solid #F5D5D0;border-radius:10px;padding:13px 16px;display:flex;align-items:flex-start;gap:11px;margin-bottom:18px}
  .alerte-strip .alerte-icon{font-size:18px;flex-shrink:0;margin-top:1px;color:var(--red)}
  .alerte-strip .alerte-title{font-weight:600;color:var(--red);font-size:13px;margin-bottom:2px}
  .alerte-strip .alerte-desc{font-size:12px;color:#8E3B31}
  .info-banner{background:#EFF6EF;border:1px solid var(--vert-pale);border-radius:10px;padding:12px 16px;font-size:12.5px;color:var(--vert);display:flex;align-items:center;gap:9px;margin-bottom:16px}
  .warn-banner{background:#FCF7E8;border:1px solid #F0E2B6;border-radius:10px;padding:12px 16px;font-size:12.5px;color:#7D6608;display:flex;align-items:center;gap:9px;margin-bottom:16px}
  /* TABLES */
  .table-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:20px}
  .table-head{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
  .table-title{font-size:13.5px;font-weight:600;color:var(--text)}
  .table-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .search-input{border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;color:var(--text);width:190px;transition:all .15s;background:#FAFBFA}
  .search-input:focus{border-color:var(--vert2);background:#fff}
  .filter-select{border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;color:var(--text);background:#FAFBFA;cursor:pointer}
  .filter-select:focus{border-color:var(--vert2)}
  table{width:100%;border-collapse:collapse}
  th{background:#FAFBFA;padding:9px 16px;text-align:left;font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border)}
  td{padding:11px 16px;font-size:13px;border-top:1px solid #F0F3F0}
  tr:hover td{background:#FAFCFA}
  .table-foot{padding:11px 20px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);background:#FAFBFA}
  .table-info{font-size:12px;color:var(--muted)}
  .pagination{display:flex;gap:4px}
  .page-btn{border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;background:#fff;font-family:'DM Sans',sans-serif;color:var(--text);transition:all .12s}
  .page-btn.active{background:var(--vert2);color:#fff;border-color:var(--vert2);font-weight:600}
  .page-btn:hover:not(.active){border-color:var(--vert2);color:var(--vert)}
  .page-btn:disabled{cursor:default;opacity:.4}
  .badge{display:inline-block;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;letter-spacing:.2px}
  .b-green{background:#E7F3E8;color:#1B5E20}
  .b-amber{background:#FCF4E6;color:#B35B00}
  .b-red{background:#FBEDEB;color:#A93226}
  .b-blue{background:#EBF3F9;color:#0D47A1}
  .b-gray{background:#F1F3F1;color:#4A5D4A}
  .b-purple{background:#F5EDF8;color:#4A148C}
  .score-row{display:flex;align-items:center;gap:8px}
  .score-bar{height:6px;border-radius:3px;background:#EDF1ED;flex:1;overflow:hidden}
  .score-fill{height:100%;border-radius:3px;transition:width .5s ease}
  .score-num{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);min-width:34px;text-align:right}
  .loading{text-align:center;padding:80px;color:var(--muted)}
  .spinner{display:inline-block;width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--vert2);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty-state{text-align:center;padding:60px;color:var(--muted)}
  .empty-icon{font-size:38px;margin-bottom:12px}
  .btn-outline{background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 13px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text);font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
  .btn-outline:hover{border-color:var(--vert2);color:var(--vert);background:var(--vert-bg)}
  .formation-prix{font-family:'DM Mono',monospace;font-size:12px;color:var(--vert);font-weight:600}
  /* CARTE */
  #leafletMap{height:540px;border-radius:10px;z-index:1}
  .map-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;font-size:12px;color:var(--muted)}
  .map-legend span{display:inline-flex;align-items:center;gap:6px}
  .map-dot{width:12px;height:12px;border-radius:50%;display:inline-block}
  /* RAPPORT PDF */
  #reportView{display:none}
  @media print{
    #app,#loginScreen{display:none!important}
    #reportView{display:block!important;font-family:'DM Sans',Arial,sans-serif;color:#17281A;padding:0 8mm}
    #reportView h1{font-family:'Playfair Display',Georgia,serif;font-size:22pt;color:#1A5319;margin-bottom:2mm}
    #reportView h2{font-size:13pt;color:#1A5319;margin:8mm 0 3mm;border-bottom:1.5pt solid #2E9E45;padding-bottom:1.5mm}
    #reportView .r-sub{color:#64796A;font-size:10pt;margin-bottom:1mm}
    #reportView .r-scope{font-size:10pt;font-weight:600;color:#1A5319;background:#EFF6EF;padding:2mm 4mm;border-radius:2mm;display:inline-block;margin:3mm 0}
    #reportView table{width:100%;border-collapse:collapse;font-size:9.5pt;margin-bottom:4mm}
    #reportView th{background:#EFF6EF;color:#1A5319;text-align:left;padding:2mm 3mm;border:0.5pt solid #C4E0C7}
    #reportView td{padding:2mm 3mm;border:0.5pt solid #E3E9E3}
    #reportView .r-kpis{display:flex;flex-wrap:wrap;gap:4mm;margin:4mm 0}
    #reportView .r-kpi{border:0.75pt solid #C4E0C7;border-radius:2mm;padding:3mm 5mm;min-width:30mm}
    #reportView .r-kpi b{display:block;font-size:16pt;color:#1A5319}
    #reportView .r-kpi span{font-size:8.5pt;color:#64796A}
    #reportView .r-footer{margin-top:8mm;padding-top:3mm;border-top:0.75pt solid #C4E0C7;font-size:8.5pt;color:#64796A;text-align:center}
  }
  /* RESPONSIVE */
  @media(max-width:980px){
    #app.on{flex-direction:column}
    .sidebar{width:100%;min-width:0;height:auto;position:static;flex-direction:row;align-items:center;overflow-x:auto}
    .side-logo{padding:12px 16px}
    .side-sep{display:none}
    .tab-bar{flex-direction:row;padding:8px 10px}
    .side-user{border-top:none;padding:8px 12px;white-space:nowrap}
    .side-user .su-name,.side-user .su-org{display:none}
    .charts-grid,.charts-grid-3{grid-template-columns:1fr}
  }
  @media(max-width:768px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.content{padding:16px}.topbar{padding:8px 14px}}

</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-orbs"></div>
  <div class="login-card">
    <div class="login-logo-wrap">
      <span class="login-leaf">&#127807;</span>
      <span class="login-logo">CultivaTech</span>
    </div>
    <div class="login-sub">Agriculture intelligente au Burkina Faso</div>
    <div class="login-divider"></div>
    <div class="login-badge">&#129309; Portail ONG</div>
    <div class="login-label">Vos identifiants</div>
    <input class="login-input" id="username" type="text" placeholder="Identifiant" autocomplete="username">
    <input class="login-input" id="password" type="password" placeholder="Mot de passe" autocomplete="current-password">
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Se connecter</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <aside class="sidebar">
    <div class="side-logo">
      <span style="font-size:21px">&#127807;</span>
      <div><span class="lg-name">CultivaTech</span><span class="lg-tag">Portail ONG</span></div>
    </div>
    <div class="side-sep"></div>
    <nav class="tab-bar" id="tabBar"></nav>
    <div class="side-user">
      <div class="su-name" id="topbarName"></div>
      <div class="su-org" id="sideOrg"></div>
      <button onclick="logout()">D&#233;connexion</button>
    </div>
  </aside>
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <span id="roleBadge" class="topbar-role badge-ong">ONG</span>
        <span id="topbarRegion" class="topbar-region"></span>
      </div>
      <div class="topbar-right">
        <select id="projetSelect" class="select-pill" onchange="onProjetChange(this.value)" style="display:none"></select>
        <select id="periodSelect" class="select-pill" onchange="onPeriodChange(this.value)">
          <option value="7">7 derniers jours</option>
          <option value="30" selected>30 derniers jours</option>
          <option value="90">Trimestre</option>
          <option value="180">Campagne (6 mois)</option>
          <option value="365">12 derniers mois</option>
        </select>
        <button class="refresh-btn" onclick="generateReport()" title="G&#233;n&#233;rer le rapport PDF">Rapport PDF</button>
        <button class="refresh-btn" onclick="exportRegionsCSV()" title="Exporter en CSV">CSV</button>
        <button class="refresh-btn" onclick="fetchAndRender()" title="Actualiser">&#8635;</button>
      </div>
    </header>
    <main class="content" id="mainContent">
      <div class="loading"><div class="spinner"></div><div>Chargement&#8230;</div></div>
    </main>
  </div>
</div>

<!-- Vue imprimable du rapport (visible uniquement à l'impression) -->
<div id="reportView"></div>

<script>
var FUNCTIONS_URL = 'https://vyqhzagajlbosikzfnit.supabase.co/functions/v1'
var TOKEN        = sessionStorage.getItem('ong_token')
var USER         = JSON.parse(sessionStorage.getItem('ong_user') || 'null')
var DATA         = null
var CHARTS       = {}
var currentTab   = null
var filteredRows = []
var currentPage  = 1
var PAGE_SIZE    = 15

var TAB_META = {
  overview: {icon:'chart',    label:"Vue d'ensemble"},
  terrain:  {icon:'sprout',   label:'Terrain'},
  carte:    {icon:'map',      label:'Carte'},
  programmes:{icon:'clipboard',label:'Programmes'},
  formations:{icon:'grad',    label:'Formations'},
  alertes:  {icon:'alert',    label:'Alertes & Risques'},
  calendrier:{icon:'calendar',label:'Calendrier cultural'}
}
var ONG_TABS = ['overview','terrain','carte','programmes','formations','alertes','calendrier']

// ════ ICÔNES SVG (remplacement des emojis — rendu professionnel) ═══════════════

function populateProjets() {
  var sel = document.getElementById('projetSelect')
  if (!sel) return
  var projets = (DATA && DATA.projets) || []
  if (projets.length === 0) { sel.style.display = 'none'; return }
  sel.style.display = ''
  var opts = '<option value="0">Tous les projets</option>'
  projets.forEach(function(p){
    opts += '<option value="' + p.id + '"' + (PROJET_ID === p.id ? ' selected' : '') + '>' +
      esc(p.nom) + (p.bailleur ? ' (' + esc(p.bailleur) + ')' : '') + '</option>'
  })
  sel.innerHTML = opts
}
function periodKpi(label, val, delta, iconName) {
  var chip
  if (delta === null || delta === undefined) chip = '<span class="kpi-delta flat">Nouveau</span>'
  else if (delta > 0) chip = '<span class="kpi-delta up">' + svgIcon('up',12) + ' +' + delta + '%</span>'
  else if (delta < 0) chip = '<span class="kpi-delta down">' + svgIcon('down',12) + ' ' + delta + '%</span>'
  else chip = '<span class="kpi-delta flat">stable</span>'
  return '<div class="kpi-card"><div class="kpi-label">' + label + '</div>' +
    '<div class="kpi-icon">' + svgIcon(iconName) + '</div>' +
    '<div class="kpi-value">' + fmtN(val) + '</div>' + chip + '</div>'
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  var username = document.getElementById('username').value.trim()
  var password = document.getElementById('password').value
  var errEl    = document.getElementById('loginError')
  errEl.textContent = ''
  if (!username || !password) { errEl.textContent = 'Identifiant et mot de passe requis.'; return }
  var btn = document.getElementById('loginBtn')
  btn.textContent = 'Connexion…'; btn.disabled = true
  try {
    var res  = await fetch(FUNCTIONS_URL + '/partner-login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:username,password:password,role:'ong'}) })
    var data = await res.json()
    if (!res.ok) { errEl.textContent = data.error || 'Identifiants incorrects.'; btn.textContent = 'Se connecter'; btn.disabled = false; return }
    TOKEN = data.token; USER = data.user
    sessionStorage.setItem('ong_token', TOKEN)
    sessionStorage.setItem('ong_user', JSON.stringify(USER))
    showApp(); await fetchAndRender()
  } catch (_) { errEl.textContent = 'Erreur r\xe9seau.'; btn.textContent = 'Se connecter'; btn.disabled = false }
}

document.getElementById('username').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('password').focus() })
document.getElementById('password').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin() })

// ── APP ───────────────────────────────────────────────────────────────────────
function showApp() {
  document.getElementById('loginScreen').style.display = 'none'
  document.getElementById('app').classList.add('on')
  document.getElementById('topbarName').textContent = USER.name || ''
  document.getElementById('sideOrg').textContent = USER.organization || 'Organisation partenaire'
  document.getElementById('topbarRegion').textContent = USER.region || 'National'
  buildTabBar()
}

function buildTabBar() {
  var bar = document.getElementById('tabBar'); bar.innerHTML = ''
  ONG_TABS.forEach(function(t, i) {
    var btn = document.createElement('button')
    btn.className = 'tab-btn' + (i===0?' active':'')
    btn.dataset.tab = t
    btn.onclick = function(){ switchTab(t) }
    var m = TAB_META[t]
    btn.innerHTML = svgIcon(m.icon) + '<span>' + m.label + '</span>'
    bar.appendChild(btn)
  })
  currentTab = ONG_TABS[0]
}

function switchTab(tab) {
  currentTab = tab
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===tab) })
  if (DATA) { killCharts(); renderCurrentTab() }
}

// ── FETCH ─────────────────────────────────────────────────────────────────────
async function fetchAndRender() {
  document.getElementById('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div><div>Chargement…</div></div>'
  try {
    var qs = '?days=' + PERIOD_DAYS + (PROJET_ID > 0 ? '&projet_id=' + PROJET_ID : '')
    var res = await fetch(FUNCTIONS_URL + '/get-partner-stats' + qs, { headers:{'Authorization':'Bearer '+TOKEN} })
    if (res.status === 401) { logout(); return }
    if (!res.ok) throw new Error('HTTP ' + res.status)
    DATA = await res.json()
    updateScopeBadge()
    populateProjets()
    killCharts(); renderCurrentTab()
  } catch (e) {
    document.getElementById('mainContent').innerHTML = '<div class="empty-state"><div class="empty-icon">&#9888;&#65039;</div><div style="margin-bottom:14px">Impossible de charger les donn\xe9es.<br><small style="color:var(--muted)">'+e.message+'</small></div><button onclick="fetchAndRender()" class="btn-outline" style="margin:0 auto">&#8634; R\xe9essayer</button></div>'
  }
}

function renderCurrentTab() {
  ({overview:renderOverview, terrain:renderTerrain, carte:renderCarte, programmes:renderProgrammes, formations:renderFormations, alertes:renderAlertes, calendrier:renderCalendrier}[currentTab]||renderOverview)()
}

async function loadProgrammes() {
  try {
    var res = await fetch(FUNCTIONS_URL + '/ong-projects', {
      method:'POST', headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},
      body: JSON.stringify({action:'list'})
    })
    var data = await res.json()
    PROJETS = data.projets || []
    renderProgList()
  } catch (e) {
    var el = document.getElementById('progList')
    if (el) el.innerHTML = '<div class="warn-banner">Impossible de charger les programmes : '+esc(e.message)+'</div>'
  }
}

function renderProgList() {
  var el = document.getElementById('progList'); if(!el) return
  if (!PROJETS || PROJETS.length === 0) {
    el.innerHTML = '<div class="info-banner">Aucun programme pour le moment. Créez-en un ci-dessus pour obtenir votre premier code d\'inscription.</div>'
    return
  }
  var h = '<div class="table-card"><div class="table-head"><div class="table-title">Vos programmes ('+PROJETS.length+')</div></div>'
  h += '<table><thead><tr><th>Programme</th><th>Bailleur</th><th>Code</th><th style="text-align:center">Bénéficiaires</th><th style="text-align:center">Statut</th><th></th></tr></thead><tbody>'
  PROJETS.forEach(function(p){
    h += '<tr>'
    h += '<td><strong>'+esc(p.nom)+'</strong></td>'
    h += '<td>'+(p.bailleur?esc(p.bailleur):'<span style="color:var(--muted)">—</span>')+'</td>'
    h += '<td><span style="font-family:\'DM Mono\',monospace;font-weight:600;color:var(--vert);background:var(--vert-bg);padding:3px 8px;border-radius:6px">'+esc(p.code_inscription)+'</span> '
    h += '<button class="btn-outline" style="padding:2px 8px;font-size:11px" onclick="copyCode(\''+esc(p.code_inscription)+'\')">Copier</button></td>'
    h += '<td style="text-align:center;font-weight:600">'+(p.beneficiaires||0)+'</td>'
    h += '<td style="text-align:center">'+(p.is_active
        ? '<span class="badge b-green">Actif</span>'
        : '<span class="badge b-gray">Désactivé</span>')+'</td>'
    h += '<td style="text-align:right"><button class="btn-outline" style="padding:4px 10px;font-size:11px" onclick="toggleProgramme('+p.id+','+(!p.is_active)+')">'
    h += (p.is_active?'Désactiver':'Réactiver')+'</button></td>'
    h += '</tr>'
  })
  h += '</tbody></table></div>'
  el.innerHTML = h
}

async function createProgramme() {
  var nom = (document.getElementById('progNom').value||'').trim()
  var bailleur = (document.getElementById('progBailleur').value||'').trim()
  var code = (document.getElementById('progCode').value||'').trim()
  var msg = document.getElementById('progFormMsg')
  if (nom.length < 3) { msg.innerHTML = '<span style="color:var(--red)">Le nom du programme est requis.</span>'; return }
  msg.innerHTML = '<span style="color:var(--muted)">Création en cours…</span>'
  try {
    var res = await fetch(FUNCTIONS_URL + '/ong-projects', {
      method:'POST', headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},
      body: JSON.stringify({action:'create', nom:nom, bailleur:bailleur, code:code})
    })
    var data = await res.json()
    if (data.success && data.projet) {
      msg.innerHTML = '<span style="color:var(--vert)">✅ Programme créé — code : <b>'+esc(data.projet.code_inscription)+'</b></span>'
      document.getElementById('progNom').value=''; document.getElementById('progBailleur').value=''; document.getElementById('progCode').value=''
      loadProgrammes()
    } else {
      msg.innerHTML = '<span style="color:var(--red)">'+esc(data.error||'Erreur')+'</span>'
    }
  } catch (e) {
    msg.innerHTML = '<span style="color:var(--red)">Erreur réseau : '+esc(e.message)+'</span>'
  }
}

async function toggleProgramme(projetId, isActive) {
  try {
    await fetch(FUNCTIONS_URL + '/ong-projects', {
      method:'POST', headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},
      body: JSON.stringify({action:'toggle', projet_id:projetId, is_active:isActive})
    })
    loadProgrammes()
  } catch (e) { alert('Erreur : '+e.message) }
}

function copyCode(code) {
  try {
    navigator.clipboard.writeText(code)
  } catch (e) {
    var ta = document.createElement('textarea'); ta.value = code; document.body.appendChild(ta); ta.select()
    try { document.execCommand('copy') } catch(_){}
    document.body.removeChild(ta)
  }
}

  html += '<span><span class="map-dot" style="background:rgba(192,57,43,.35);border:2px solid #C0392B"></span>Zone \xe9tat d\'urgence</span>'
  html += '<span><span class="map-dot" style="background:rgba(214,137,16,.35);border:2px solid #D68910"></span>\xc9tat d\'urgence partiel</span>'
  html += '</div></div>'
  if (pts.length === 0) {
    html += '<div class="info-banner">&#128161; Aucun terrain g\xe9olocalis\xe9 pour le moment. Les b\xe9n\xe9ficiaires enregistrent la position de leur terrain dans l\'app CultivaTech (Profil &#8594; Terrain agricole).</div>'
  }
  setMain(html)

  setTimeout(function() {
    if (typeof L === 'undefined') return
    var map = L.map('leafletMap').setView([12.3,-1.6], 7)
    window.MAP = map
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap', maxZoom: 17
    }).addTo(map)

    // Calque zones d'urgence (cercles sur les régions concernées)
    Object.keys(SECURITY_ZONES).forEach(function(reg) {
      var z = SECURITY_ZONES[reg], c = REGION_COORDS[reg]
      if (!c) return
      L.circle(c, {
        radius: 65000,
        color: ZONE_COLORS[z.level] || '#aaa',
        weight: 2,
        fillColor: ZONE_COLORS[z.level] || '#aaa',
        fillOpacity: 0.13
      }).addTo(map).bindPopup(
        '<b>' + esc(reg) + ' — ' + esc(z.label) + '</b><br>' +
        '<small>Provinces : ' + esc(z.provinces) + '</small><br>' +
        '<small style="color:#666">' + esc(z.source) + '</small>'
      )
    })

    // Marqueurs bénéficiaires
    pts.forEach(function(p) {
      if (typeof p.lat !== 'number' || typeof p.lng !== 'number') return
      var col = (p.score !== null && p.score >= 60) ? '#36AF3B' : '#D68910'
      L.circleMarker([p.lat, p.lng], {
        radius: 7, color: '#fff', weight: 2, fillColor: col, fillOpacity: 0.95
      }).addTo(map).bindPopup(
        '<b>' + esc(p.nom) + '</b><br>' +
        (p.region ? '<small>' + esc(p.region) + (p.province ? ' — ' + esc(p.province) : '') + '</small><br>' : '') +
        (p.score !== null ? '<small>Score agricole : <b>' + p.score + '</b></small><br>' : '') +
        (p.statut ? '<small>' + esc(p.statut) + '</small>' : '')
      )
    })

    // Ajuster la vue si des points existent
    if (pts.length > 0) {
      var grp = pts.filter(function(p){return typeof p.lat==='number'}).map(function(p){return [p.lat,p.lng]})
      if (grp.length > 0) { try { map.fitBounds(grp, {padding:[40,40], maxZoom:11}) } catch(e){} }
    }
  }, 60)
}

// ════ EXPORTS CSV ═════════════════════════════════════════════════════════════
function downloadCSV(filename, rows) {
  var csv = rows.map(function(r){
    return r.map(function(v){
      v = (v === null || v === undefined) ? '' : String(v)
      return /[";\n]/.test(v) ? '"' + v.replace(/"/g,'""') + '"' : v
    }).join(';')
  }).join('\r\n')
  // BOM UTF-8 pour Excel
  var blob = new Blob(['﻿' + csv], {type:'text/csv;charset=utf-8'})
  var a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = filename
  a.click()
  URL.revokeObjectURL(a.href)
}

function filterFormations() {
  var q=(document.getElementById('searchFormations')||{value:''}).value.toLowerCase()
  var cat=(document.getElementById('filterCateg')||{value:''}).value
  var grat=(document.getElementById('filterGrat')||{value:''}).value
  var all=((DATA.ong&&DATA.ong.trainings&&DATA.ong.trainings.list)||[])
  filteredRows=all.filter(function(t){var mQ=!q||(t.title||'').toLowerCase().includes(q)||(t.organisme||'').toLowerCase().includes(q)||(t.ville||'').toLowerCase().includes(q);var mC=!cat||t.categorie===cat;var mG=!grat||(grat==='free'&&t.is_free)||(grat==='paid'&&!t.is_free);return mQ&&mC&&mG})
  currentPage=1;renderFormationsTable()
}
function renderFormationsTable() {
  var total=filteredRows.length,pages=Math.ceil(total/PAGE_SIZE)||1
  currentPage=Math.min(currentPage,pages)
  var slice=filteredRows.slice((currentPage-1)*PAGE_SIZE,currentPage*PAGE_SIZE)
  var body=document.getElementById('formationsBody');if(!body)return
  body.innerHTML=slice.length===0?'<tr><td colspan="8" style="text-align:center;padding:28px;color:var(--muted)">Aucun r\xe9sultat</td></tr>':slice.map(function(t,i){var idx=(currentPage-1)*PAGE_SIZE+i+1;var prix=t.is_free?'<span class="badge b-green">Gratuite</span>':(t.prix?'<span class="formation-prix">'+fmtN(t.prix)+' FCFA</span>':'<span style="color:var(--muted)">N/A</span>');var cert=t.is_certifiante?'<span class="badge b-purple">&#127941; Oui</span>':'<span style="color:var(--muted);font-size:12px">—</span>';var debut=t.date_debut?new Date(t.date_debut).toLocaleDateString('fr-FR'):'—';return'<tr><td style="color:var(--muted);font-size:12px">'+idx+'</td><td><strong>'+esc(t.title||'')+'</strong></td><td style="font-size:12px;color:var(--muted)">'+esc(t.organisme||'—')+'</td><td><span class="badge b-blue">'+esc(t.ville||'—')+'</span></td><td style="font-size:12px">'+esc(t.categorie||'—')+'</td><td>'+prix+'</td><td>'+cert+'</td><td style="font-family:\'DM Mono\',monospace;font-size:12px">'+debut+'</td></tr>'}).join('')
  document.getElementById('fInfo').textContent=total+' formation'+(total>1?'s':'')+' — page '+currentPage+'/'+pages
  buildPagination('fPag',pages,'formations')
}

  html+='<div style="overflow-x:auto;padding:16px 22px"><table style="min-width:860px;border-collapse:collapse"><thead><tr><th style="width:110px;text-align:left;background:none">Culture</th>'
  BFA_CALENDAR.forEach(function(m,i){html+='<th style="text-align:center;font-size:10px;padding:5px 2px;background:'+(i===mi?'rgba(54,175,59,.12)':'')+'">'+m.mois.slice(0,3)+(i===mi?'<br><span style="color:var(--vert2)">▲</span>':'')+'</th>'})
  html+='</tr></thead><tbody>'
  var STRIPS=[{name:'&#127806; Mil / Sorgho',slots:[null,null,null,null,'sow','work','work','grow','harvest','harvest',null,null]},{name:'&#127805; Ma\xefs',slots:[null,null,null,'sow','sow','work','work','harvest','harvest',null,null,null]},{name:'&#127807; Coton',slots:['harvest',null,null,null,'sow','work','treat','treat',null,'harvest','harvest',null]},{name:'&#129380; Arachide',slots:[null,null,null,null,null,'sow','sow','grow','harvest','harvest',null,null]},{name:'&#129388; Mara\xeechage',slots:['grow','grow','grow',null,null,null,null,null,null,'sow','grow','grow']},{name:'&#127793; S\xe9same',slots:[null,null,null,null,null,null,'sow','grow','harvest','harvest',null,null]}]
  var TC={sow:'#36AF3B',work:'#2471A3',treat:'#7D3C98',harvest:'#C8A84B',grow:'#1A5319'}
  STRIPS.forEach(function(c){html+='<tr><td style="font-size:12px;font-weight:600;padding:6px 4px">'+c.name+'</td>';c.slots.forEach(function(s,i){var isCur=i===mi;html+='<td style="padding:3px 2px"><div style="height:26px;border-radius:5px;background:'+(s?TC[s]+'CC':'#EEF2EE')+';border:'+(isCur?'2px solid var(--vert2)':'1px solid transparent')+';display:flex;align-items:center;justify-content:center">'+(s&&isCur?'<span style="font-size:9px;color:#fff;font-weight:700">★</span>':'')+'</div></td>'});html+='</tr>'})
  html+='</tbody></table>'
  html+='<div style="display:flex;flex-wrap:wrap;gap:14px;margin-top:14px">'
  var TL={sow:'Semis',work:'Sarclage/Entretien',treat:'Traitement phyto',harvest:'R\xe9colte',grow:'Culture active'}
  Object.entries(TC).forEach(function(e){html+='<div style="display:flex;align-items:center;gap:5px"><div style="width:14px;height:14px;border-radius:3px;background:'+e[1]+'"></div><span style="font-size:11px;color:var(--muted)">'+TL[e[0]]+'</span></div>'})
  html+='</div></div></div>'
  html+='<div class="alerte-strip" style="border-left-color:var(--amber);background:linear-gradient(135deg,#FFF8E1,#FFF3CD);margin-bottom:24px"><div class="alerte-icon">&#9888;&#65039;</div><div><div class="alerte-title" style="color:#7D6608">P\xe9riode de soudure — Mai \xe0 Septembre</div><div class="alerte-desc" style="color:#7D6608">Phase critique entre la fin des r\xe9serves et la nouvelle r\xe9colte. Intervention ONG prioritaire : aide alimentaire, semences, suivi nutritionnel, cash transfers.</div></div></div>'
  html+='<div class="subsection-label">D\xe9tail mensuel</div>'
  html+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px">'
  BFA_CALENDAR.forEach(function(m,i){var isCur=i===mi;html+='<div class="chart-card" style="'+(isCur?'border:2px solid var(--vert2);background:linear-gradient(135deg,#F4FAF4,#EAF5EA)':'')+'"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><strong style="font-size:13px;color:'+(isCur?'var(--vert)':'var(--text)')+'">'+m.icon+' '+esc(m.mois)+'</strong><div style="display:flex;gap:4px">'+(isCur?'<span class="badge b-green" style="font-size:9px">Actuel</span>':'')+(m.soudure?'<span class="badge b-amber" style="font-size:9px">Soudure</span>':'')+'</div></div><div style="font-size:10px;color:var(--muted);margin-bottom:8px">'+esc(m.saison)+'</div>';m.activites.forEach(function(a){var ic={sow:'&#127793;',work:'&#9874;&#65039;',harvest:'&#127806;',treat:'&#128138;',prep:'&#128203;',grow:'&#127807;'}[a.type]||'•';html+='<div style="font-size:11px;padding:3px 0;display:flex;gap:4px;border-bottom:1px solid #f0f4f0"><span>'+ic+'</span><span><strong>'+esc(a.culture)+'</strong> — '+esc(a.op)+'</span></div>'});html+='</div>'})
  html+='</div>'
  setMain(html)
}

// ── PAGINATION ────────────────────────────────────────────────────────────────
function buildPagination(cid,pages,ctx) {
  var pag=document.getElementById(cid);if(!pag)return;pag.innerHTML=''
  if(currentPage>1)addPageBtn(pag,'‹',currentPage-1,false,ctx)
  for(var p=Math.max(1,currentPage-2);p<=Math.min(pages,currentPage+2);p++)addPageBtn(pag,p,p,p===currentPage,ctx)
  if(currentPage<pages)addPageBtn(pag,'›',currentPage+1,false,ctx)
}
function addPageBtn(container,label,page,active,ctx) {
  var b=document.createElement('button');b.className='page-btn'+(active?' active':'');b.textContent=label
  var p=page;b.onclick=function(){currentPage=p;renderFormationsTable()}
  if(active)b.disabled=true;container.appendChild(b)
}

// ── LOGOUT ────────────────────────────────────────────────────────────────────
function logout() {
  sessionStorage.removeItem('ong_token');sessionStorage.removeItem('ong_user')
  TOKEN=null;USER=null;DATA=null;killCharts()
  document.getElementById('loginScreen').style.display='flex'
  document.getElementById('app').style.display='none'
  document.getElementById('username').value='';document.getElementById('password').value=''
  document.getElementById('loginError').textContent=''
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function fmtN(n)      { return n!=null?Number(n).toLocaleString('fr-FR'):'—' }
function fmtDate(iso) { return iso?new Date(iso).toLocaleString('fr-FR',{dateStyle:'short',timeStyle:'short'}):'—' }
function esc(s)       { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function kpiCard(cls,icon,val,label,suffix) {
  var display=(val===null||val===undefined||val===''||val===0&&label.includes('Score'))?'—':fmtN(val)+(suffix||'')
  if(val===0&&!label.includes('Score'))display='0'
  return '<div class="kpi-card '+(cls||'')+'"><div class="kpi-icon">'+icon+'</div><div class="kpi-value">'+display+'</div><div class="kpi-label">'+label+'</div></div>'
}
function urgBadge(u) { var m={'\xc9lev\xe9e':'b-red','Mod\xe9r\xe9e':'b-amber','Faible':'b-green'};return '<span class="badge '+(m[u]||'b-gray')+'">'+esc(u||'—')+'</span>' }
</script>
