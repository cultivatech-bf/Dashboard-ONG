<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CultivaTech — Portail ONG</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --vert:#1A5319;--vert2:#36AF3B;--vert-pale:#D6EFD8;--vert-bg:#F4FAF4;
    --or:#C8A84B;--bg:#F0F4F0;--card:#FFFFFF;
    --border:#E4EDE4;--text:#1A2E1A;--muted:#6B8F6B;
    --red:#C0392B;--amber:#D68910;--blue:#2471A3;--purple:#7D3C98;
    --shadow:0 2px 8px rgba(26,83,25,.10),0 8px 32px rgba(26,83,25,.07);
    --shadow-lg:0 4px 24px rgba(26,83,25,.14),0 12px 48px rgba(26,83,25,.10);
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
  /* LOGIN */
  #loginScreen{position:fixed;inset:0;z-index:1000;background:linear-gradient(145deg,#061206 0%,#0D2E0D 30%,#1A5319 65%,#0A3A1A 100%);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .login-orbs{position:absolute;inset:0;pointer-events:none}
  .login-orbs::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(54,175,59,.12) 0%,transparent 70%);top:-100px;right:-100px}
  .login-orbs::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(200,168,75,.08) 0%,transparent 70%);bottom:-80px;left:-80px}
  .login-card{position:relative;background:rgba(255,255,255,.06);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border:1px solid rgba(255,255,255,.12);border-radius:28px;padding:52px 48px;width:420px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.4)}
  .login-logo-wrap{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
  .login-logo{font-family:'Playfair Display',serif;font-size:28px;color:#fff;letter-spacing:-.5px}
  .login-leaf{font-size:28px}
  .login-sub{color:rgba(255,255,255,.4);font-size:12px;letter-spacing:.3px;margin-bottom:8px}
  .login-divider{width:40px;height:1px;background:rgba(54,175,59,.4);margin:16px auto 20px}
  .login-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(54,175,59,.18);border:1px solid rgba(54,175,59,.35);color:rgba(54,175,59,.9);font-size:11px;font-weight:600;padding:6px 18px;border-radius:20px;margin-bottom:28px;letter-spacing:.8px;text-transform:uppercase}
  .login-label{font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;text-align:left}
  .login-input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:13px;padding:14px 18px;color:#fff;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:10px;transition:all .2s;letter-spacing:.2px}
  .login-input::placeholder{color:rgba(255,255,255,.28)}
  .login-input:focus{border-color:rgba(54,175,59,.6);background:rgba(255,255,255,.09);box-shadow:0 0 0 3px rgba(54,175,59,.1)}
  .login-btn{width:100%;background:linear-gradient(135deg,#36AF3B 0%,#2d9e32 100%);border:none;border-radius:13px;padding:15px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .25s;margin-top:6px;letter-spacing:.3px;box-shadow:0 4px 20px rgba(54,175,59,.35)}
  .login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(54,175,59,.45)}
  .login-btn:disabled{opacity:.5;transform:none;cursor:not-allowed;box-shadow:none}
  .login-error{color:#ff8a80;font-size:12px;margin-top:10px;min-height:18px}
  /* APP */
  #app{display:none;min-height:100vh}
  .topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:62px;padding:0 36px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 12px rgba(26,83,25,.08)}
  .topbar-left{display:flex;align-items:center;gap:14px}
  .topbar-logo{font-family:'Playfair Display',serif;font-size:19px;color:var(--vert);letter-spacing:-.3px}
  .topbar-sep{width:1px;height:22px;background:var(--border)}
  .topbar-role{display:inline-flex;align-items:center;gap:6px;padding:4px 13px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px}
  .badge-ong{background:linear-gradient(135deg,#E8F5E9,#C8E6C9);color:var(--vert);border:1px solid #A5D6A7}
  .topbar-name{font-size:13px;color:var(--muted);font-weight:500}
  .topbar-right{display:flex;align-items:center;gap:14px}
  .topbar-region{font-size:12px;color:var(--muted);background:var(--vert-bg);border:1px solid var(--border);padding:4px 10px;border-radius:20px}
  .refresh-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;gap:4px}
  .refresh-btn:hover{border-color:var(--vert2);color:var(--vert)}
  .logout-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
  .logout-btn:hover{border-color:var(--red);color:var(--red);background:#fff5f5}
  .tab-bar{background:#fff;border-bottom:1px solid var(--border);padding:0 36px;display:flex;gap:4px}
  .tab-btn{background:none;border:none;border-bottom:3px solid transparent;padding:14px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;gap:7px;white-space:nowrap}
  .tab-btn:hover{color:var(--text)}
  .tab-btn.active{color:var(--vert);border-bottom-color:var(--vert2);font-weight:600}
  .content{padding:36px;max-width:1360px;margin:0 auto}
  .page-header{margin-bottom:28px}
  .section-title{font-family:'Playfair Display',serif;font-size:24px;color:var(--vert);margin-bottom:5px}
  .section-sub{font-size:13px;color:var(--muted)}
  .subsection-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;margin:32px 0 14px;display:flex;align-items:center;gap:8px}
  .subsection-label::after{content:'';flex:1;height:1px;background:var(--border)}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px}
  .kpi-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px 24px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;transition:box-shadow .2s,transform .2s}
  .kpi-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--vert2);border-radius:3px 3px 0 0}
  .kpi-card.kpi-blue::before{background:var(--blue)}
  .kpi-card.kpi-amber::before{background:var(--amber)}
  .kpi-card.kpi-purple::before{background:var(--purple)}
  .kpi-card.kpi-red::before{background:var(--red)}
  .kpi-icon{font-size:24px;line-height:1}
  .kpi-value{font-size:30px;font-weight:700;color:var(--vert);letter-spacing:-1.5px;line-height:1}
  .kpi-label{font-size:12px;color:var(--muted);font-weight:500;line-height:1.3}
  .kpi-card.kpi-blue .kpi-value{color:var(--blue)}
  .kpi-card.kpi-amber .kpi-value{color:var(--amber)}
  .kpi-card.kpi-purple .kpi-value{color:var(--purple)}
  .kpi-card.kpi-red .kpi-value{color:var(--red)}
  .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
  .charts-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:24px}
  .chart-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:26px;box-shadow:var(--shadow)}
  .chart-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:18px;display:flex;align-items:center;gap:7px}
  .chart-wrap{position:relative;height:260px}
  .alerte-strip{background:linear-gradient(135deg,#FDECEA,#FDEDEA);border:1px solid #FADBD8;border-left:4px solid var(--red);border-radius:12px;padding:14px 18px;display:flex;align-items:flex-start;gap:12px;margin-bottom:22px}
  .alerte-strip .alerte-icon{font-size:20px;flex-shrink:0;margin-top:1px}
  .alerte-strip .alerte-title{font-weight:600;color:var(--red);font-size:13px;margin-bottom:3px}
  .alerte-strip .alerte-desc{font-size:12px;color:#922B21}
  .info-banner{background:linear-gradient(135deg,#F0F9F0,#EAF5EA);border:1px solid var(--vert-pale);border-left:4px solid var(--vert2);border-radius:12px;padding:14px 18px;font-size:13px;color:var(--vert);display:flex;align-items:center;gap:10px;margin-bottom:20px}
  .warn-banner{background:linear-gradient(135deg,#FFF8E1,#FFF3CD);border:1px solid #FFE082;border-left:4px solid var(--amber);border-radius:12px;padding:13px 16px;font-size:12px;color:#7D6608;display:flex;align-items:center;gap:8px;margin-bottom:20px}
  .table-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:24px}
  .table-head{padding:16px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px;background:linear-gradient(to right,#fff,#FAFCFA)}
  .table-title{font-size:14px;font-weight:600;color:var(--text)}
  .table-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .search-input{border:1px solid var(--border);border-radius:9px;padding:8px 13px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;color:var(--text);width:200px;transition:all .2s;background:#FAFCFA}
  .search-input:focus{border-color:var(--vert2);box-shadow:0 0 0 3px rgba(54,175,59,.1);background:#fff}
  .filter-select{border:1px solid var(--border);border-radius:9px;padding:8px 10px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;color:var(--text);background:#FAFCFA;cursor:pointer;transition:all .2s}
  .filter-select:focus{border-color:var(--vert2)}
  table{width:100%;border-collapse:collapse}
  th{background:var(--vert-bg);padding:10px 18px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
  td{padding:12px 18px;font-size:13px;border-top:1px solid #F0F4F0}
  tr:hover td{background:#F8FBF8}
  .table-foot{padding:13px 22px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);background:var(--vert-bg)}
  .table-info{font-size:12px;color:var(--muted)}
  .pagination{display:flex;gap:4px}
  .page-btn{border:1px solid var(--border);border-radius:7px;padding:5px 11px;font-size:12px;cursor:pointer;background:#fff;font-family:'DM Sans',sans-serif;color:var(--text);transition:all .15s}
  .page-btn.active{background:var(--vert2);color:#fff;border-color:var(--vert2);font-weight:600}
  .page-btn:hover:not(.active){border-color:var(--vert2);color:var(--vert)}
  .page-btn:disabled{cursor:default;opacity:.4}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.2px}
  .b-green{background:#E8F5E9;color:#1B5E20}
  .b-amber{background:#FFF8E1;color:#E65100}
  .b-red{background:#FDECEA;color:#B71C1C}
  .b-blue{background:#E3F2FD;color:#0D47A1}
  .b-gray{background:#F5F5F5;color:#424242}
  .b-purple{background:#F3E5F5;color:#4A148C}
  .score-row{display:flex;align-items:center;gap:8px}
  .score-bar{height:7px;border-radius:4px;background:#EEF2EE;flex:1;overflow:hidden}
  .score-fill{height:100%;border-radius:4px;transition:width .5s ease}
  .score-num{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);min-width:34px;text-align:right}
  .loading{text-align:center;padding:80px;color:var(--muted)}
  .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--vert2);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty-state{text-align:center;padding:60px;color:var(--muted)}
  .empty-icon{font-size:42px;margin-bottom:14px}
  .btn-outline{background:none;border:1px solid var(--border);border-radius:9px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--muted);transition:all .2s;display:inline-flex;align-items:center;gap:5px}
  .btn-outline:hover{border-color:var(--vert2);color:var(--vert);background:var(--vert-bg)}
  .formation-prix{font-family:'DM Mono',monospace;font-size:12px;color:var(--vert);font-weight:600}
  @media(max-width:900px){.charts-grid,.charts-grid-3{grid-template-columns:1fr}}
  @media(max-width:768px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.content{padding:16px}.topbar{padding:0 16px}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-orbs"></div>
  <div class="login-card">
    <div class="login-logo-wrap">
      <span class="login-leaf">&#127807;</span>
      <span class="login-logo">CultivaTech</span>
    </div>
    <div class="login-sub">Agriculture intelligente au Burkina Faso</div>
    <div class="login-divider"></div>
    <div class="login-badge">&#129309; Portail ONG</div>
    <div class="login-label">Vos identifiants</div>
    <input class="login-input" id="username" type="text" placeholder="Identifiant" autocomplete="username">
    <input class="login-input" id="password" type="password" placeholder="Mot de passe" autocomplete="current-password">
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Se connecter</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">&#127807; CultivaTech</span>
      <div class="topbar-sep"></div>
      <span id="roleBadge" class="topbar-role badge-ong">&#129309; ONG</span>
      <span id="topbarName" class="topbar-name"></span>
    </div>
    <div class="topbar-right">
      <span id="topbarRegion" class="topbar-region"></span>
      <button class="refresh-btn" onclick="fetchAndRender()">&#8635; Actualiser</button>
      <button class="logout-btn" onclick="logout()">D&#233;connexion</button>
    </div>
  </header>
  <nav class="tab-bar" id="tabBar"></nav>
  <main class="content" id="mainContent">
    <div class="loading"><div class="spinner"></div><div>Chargement&#8230;</div></div>
  </main>
</div>

<script>
var FUNCTIONS_URL = 'https://vyqhzagajlbosikzfnit.supabase.co/functions/v1'
var TOKEN        = sessionStorage.getItem('ong_token')
var USER         = JSON.parse(sessionStorage.getItem('ong_user') || 'null')
var DATA         = null
var CHARTS       = {}
var currentTab   = null
var filteredRows = []
var currentPage  = 1
var PAGE_SIZE    = 15

var TAB_META = {
  overview: {icon:'&#128202;', label:"Vue d'ensemble"},
  terrain:  {icon:'&#127806;', label:'Terrain'},
  formations:{icon:'&#127891;',label:'Formations'},
  alertes:  {icon:'&#128680;', label:'Alertes &amp; Risques'},
  calendrier:{icon:'&#128197;',label:'Calendrier cultural'}
}
var ONG_TABS = ['overview','terrain','formations','alertes','calendrier']

if (TOKEN && USER && USER.role === 'ong') { showApp(); fetchAndRender() }

// ── LOGIN ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  var username = document.getElementById('username').value.trim()
  var password = document.getElementById('password').value
  var errEl    = document.getElementById('loginError')
  errEl.textContent = ''
  if (!username || !password) { errEl.textContent = 'Identifiant et mot de passe requis.'; return }
  var btn = document.getElementById('loginBtn')
  btn.textContent = 'Connexion…'; btn.disabled = true
  try {
    var res  = await fetch(FUNCTIONS_URL + '/partner-login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:username,password:password,role:'ong'}) })
    var data = await res.json()
    if (!res.ok) { errEl.textContent = data.error || 'Identifiants incorrects.'; btn.textContent = 'Se connecter'; btn.disabled = false; return }
    TOKEN = data.token; USER = data.user
    sessionStorage.setItem('ong_token', TOKEN)
    sessionStorage.setItem('ong_user', JSON.stringify(USER))
    showApp(); await fetchAndRender()
  } catch (_) { errEl.textContent = 'Erreur r\xe9seau.'; btn.textContent = 'Se connecter'; btn.disabled = false }
}

document.getElementById('username').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('password').focus() })
document.getElementById('password').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin() })

// ── APP ───────────────────────────────────────────────────────────────────────
function showApp() {
  document.getElementById('loginScreen').style.display = 'none'
  document.getElementById('app').style.display = 'block'
  document.getElementById('topbarName').textContent = USER.name
  document.getElementById('topbarRegion').textContent = '&#128205; ' + (USER.region || 'National')
  buildTabBar()
}

function buildTabBar() {
  var bar = document.getElementById('tabBar'); bar.innerHTML = ''
  ONG_TABS.forEach(function(t, i) {
    var btn = document.createElement('button')
    btn.className = 'tab-btn' + (i===0?' active':'')
    btn.dataset.tab = t
    btn.onclick = function(){ switchTab(t) }
    var m = TAB_META[t]
    btn.innerHTML = m.icon + ' ' + m.label
    bar.appendChild(btn)
  })
  currentTab = ONG_TABS[0]
}

function switchTab(tab) {
  currentTab = tab
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===tab) })
  if (DATA) { killCharts(); renderCurrentTab() }
}

// ── FETCH ─────────────────────────────────────────────────────────────────────
async function fetchAndRender() {
  document.getElementById('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div><div>Chargement…</div></div>'
  try {
    var res = await fetch(FUNCTIONS_URL + '/get-partner-stats', { headers:{'Authorization':'Bearer '+TOKEN} })
    if (res.status === 401) { logout(); return }
    if (!res.ok) throw new Error('HTTP ' + res.status)
    DATA = await res.json()
    killCharts(); renderCurrentTab()
  } catch (e) {
    document.getElementById('mainContent').innerHTML = '<div class="empty-state"><div class="empty-icon">&#9888;&#65039;</div><div style="margin-bottom:14px">Impossible de charger les donn\xe9es.<br><small style="color:var(--muted)">'+e.message+'</small></div><button onclick="fetchAndRender()" class="btn-outline" style="margin:0 auto">&#8634; R\xe9essayer</button></div>'
  }
}

function renderCurrentTab() {
  ({overview:renderOverview, terrain:renderTerrain, formations:renderFormations, alertes:renderAlertes, calendrier:renderCalendrier}[currentTab]||renderOverview)()
}

// ── CHARTS ────────────────────────────────────────────────────────────────────
function killCharts() { Object.values(CHARTS).forEach(function(c){try{c.destroy()}catch(e){}}); CHARTS={} }
function mkChart(id, cfg) {
  var el = document.getElementById(id); if(!el) return null
  try { var ex=Chart.getChart(el); if(ex) ex.destroy() } catch(e){}
  CHARTS[id] = new Chart(el, cfg); return CHARTS[id]
}
function axisOpts(opt) {
  opt = opt||{}
  return { responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:opt.legend!==false,position:'bottom',labels:{font:{family:'DM Sans',size:12},boxWidth:12,padding:16}}},
    scales:{x:{stacked:!!opt.stacked,grid:{display:false},ticks:{font:{family:'DM Sans',size:11}}},y:{stacked:!!opt.stacked,beginAtZero:true,max:opt.max,grid:{color:'#F0F4F0'},ticks:{font:{family:'DM Sans',size:11}}}} }
}
function horzOpts(opt) {
  opt=opt||{}
  return { responsive:true,maintainAspectRatio:false,indexAxis:'y',
    plugins:{legend:{display:!!opt.legend}},
    scales:{x:{beginAtZero:true,max:opt.max,grid:{color:'#F0F4F0'},ticks:{font:{family:'DM Sans',size:11}}},y:{grid:{display:false},ticks:{font:{family:'DM Sans',size:11}}}} }
}
function donutOpts(opt) {
  opt=opt||{}
  return { plugins:{legend:{position:'bottom',labels:{font:{family:'DM Sans',size:12},boxWidth:12,padding:14}}},cutout:opt.cutout||'58%',maintainAspectRatio:false,responsive:true }
}
function greenPalette(n) { var arr=[]; for(var i=0;i<n;i++) arr.push('hsl('+(120+i*18)+','+(60-i*2)+'%,'+(38+i*3)+'%)'); return arr }
var URGCOL = {'\xc9lev\xe9e':'#C0392B','Mod\xe9r\xe9e':'#D68910','Faible':'#36AF3B','Inconnue':'#aaa'}

// ── DONNÉES STATIQUES ─────────────────────────────────────────────────────────

// ════ VUE D'ENSEMBLE ══════════════════════════════════════════════════════════
function renderOverview() {
  var k    = DATA.kpis || {}
  var ong  = DATA.ong  || {}
  var g    = (ong.scores && ong.scores.global) || {}
  var tr   = ong.trainings || {}
  var vuln = (ong.diagnostics && ong.diagnostics.vulnerabilite) || []
  var regs = (ong.scores && ong.scores.by_region) || []
  var urgent = vuln.filter(function(v){ return v.urgency==='\xc9lev\xe9e' })

  var html = '<div class="page-header"><h2 class="section-title">Vue d\'ensemble</h2><p class="section-sub">Indicateurs cl\xe9s — mis \xe0 jour le '+fmtDate(DATA.last_updated)+'</p></div>'
  if (urgent.length > 0) {
    html += '<div class="alerte-strip"><div class="alerte-icon">&#128680;</div><div><div class="alerte-title">Alerte phytosanitaire — '+urgent.length+' menace'+(urgent.length>1?'s':'')+' \xe0 urgence \xe9lev\xe9e</div><div class="alerte-desc">'+urgent.slice(0,3).map(function(v){return v.name+' ('+v.count+' cas)'}).join(' • ')+'</div></div></div>'
  }
  html += '<div class="kpi-grid">'
  html += kpiCard('','&#128106;',k.users,'B\xe9n\xe9ficiaires inscrits')
  html += kpiCard('kpi-amber','&#127807;',k.productions,'Productions enregistr\xe9es')
  html += kpiCard('kpi-blue','&#128205;',regs.length||null,'R\xe9gions couvertes')
  html += kpiCard('kpi-purple','&#128300;',k.diagnostics,'Diagnostics r\xe9alis\xe9s')
  html += kpiCard('','&#11088;',g.total>0?g.moyenne:null,'Score agricole moyen')
  html += kpiCard('kpi-blue','&#9989;',g.total>0?g.eligible:null,'\xc9ligibles cr\xe9dit')
  html += kpiCard('kpi-amber','&#127891;',tr.total>0?tr.total:null,'Formations disponibles')
  html += kpiCard('','&#128203;',ong.fiches_total>0?ong.fiches_total:null,'Fiches consult\xe9es')
  html += '</div>'
  html += '<div class="subsection-label">Couverture et composition</div>'
  html += '<div class="charts-grid">'
  if (regs.length>0) {
    html += '<div class="chart-card"><div class="chart-title">&#128205; B\xe9n\xe9ficiaires par r\xe9gion</div><div class="chart-wrap"><canvas id="cOvRegion"></canvas></div></div>'
  } else {
    html += '<div class="chart-card" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:200px"><div style="font-size:40px">&#128507;</div><div style="font-size:13px;color:var(--muted);text-align:center;max-width:260px">La couverture r\xe9gionale s\'affichera d\xe8s que les agriculteurs activent la g\xe9olocalisation.</div></div>'
  }
  html += '<div class="chart-card"><div class="chart-title">&#128202; Statut d\'\xe9ligibilit\xe9 cr\xe9dit</div><div class="chart-wrap"><canvas id="cOvStatut"></canvas></div></div>'
  html += '</div>'
  if (vuln.length > 0) {
    html += '<div class="subsection-label">Menaces phytosanitaires actives</div>'
    html += '<div class="charts-grid">'
    html += '<div class="chart-card"><div class="chart-title">&#128308; Top maladies d\xe9tect\xe9es</div><div class="chart-wrap"><canvas id="cOvVuln"></canvas></div></div>'
    html += '<div class="chart-card"><div class="chart-title">R\xe9partition par niveau d\'urgence</div><div class="chart-wrap"><canvas id="cOvUrg"></canvas></div></div>'
    html += '</div>'
  }
  document.getElementById('mainContent').innerHTML = html
  setTimeout(function() {
    if (regs.length>0) mkChart('cOvRegion',{type:'bar',data:{labels:regs.map(function(r){return r.region}),datasets:[{label:'Total',data:regs.map(function(r){return r.total}),backgroundColor:'rgba(54,175,59,.2)',borderRadius:5},{label:'\xc9ligibles',data:regs.map(function(r){return r.eligible}),backgroundColor:'#36AF3B',borderRadius:5}]},options:axisOpts({legend:true})})
    var el2=g.eligible||0,tot2=g.total||0
    if (tot2>0) mkChart('cOvStatut',{type:'doughnut',data:{labels:['\xc9ligibles cr\xe9dit','Non encore \xe9ligibles'],datasets:[{data:[el2,tot2-el2],backgroundColor:['#36AF3B','#E8F5E9'],borderWidth:2,borderColor:'#fff'}]},options:donutOpts()})
    else { var el3=document.getElementById('cOvStatut'); if(el3) el3.parentElement.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--muted);font-size:13px">Aucun score enregistr\xe9</div>' }
    if (vuln.length>0) {
      var top6=vuln.slice(0,6)
      mkChart('cOvVuln',{type:'bar',data:{labels:top6.map(function(m){return m.name.length>20?m.name.slice(0,20)+'…':m.name}),datasets:[{data:top6.map(function(m){return m.count}),backgroundColor:top6.map(function(m){return URGCOL[m.urgency]||'#aaa'}),borderRadius:6}]},options:horzOpts()})
      var urgMap={};vuln.forEach(function(m){var k=m.urgency||'Inconnue';urgMap[k]=(urgMap[k]||0)+m.count})
      mkChart('cOvUrg',{type:'doughnut',data:{labels:Object.keys(urgMap),datasets:[{data:Object.values(urgMap),backgroundColor:Object.keys(urgMap).map(function(k){return URGCOL[k]||'#aaa'}),borderWidth:2,borderColor:'#fff'}]},options:donutOpts()})
    }
  }, 80)
}

function renderTerrain() {
  var ong=DATA.ong||{},scores=ong.scores||{global:{},by_region:[]},g=scores.global||{}
  var regions=(scores.by_region||[]).slice(0,12),topC=ong.top_cultures||[]
  var vuln=(ong.diagnostics&&ong.diagnostics.vulnerabilite)||[]
  var diagTotal=(ong.diagnostics&&ong.diagnostics.total)||0,kpis=DATA.kpis||{}
  var html='<div class="page-header"><h2 class="section-title">Terrain agricole</h2><p class="section-sub">Scores agricoles, cultures pratiqu\xe9es et sant\xe9 phytosanitaire</p></div>'
  html+='<div class="kpi-grid" style="grid-template-columns:repeat(5,1fr)">'
  html+=kpiCard('','&#128106;',g.total||null,'B\xe9n\xe9ficiaires suivis')
  html+=kpiCard('kpi-blue','&#9989;',g.eligible||null,'\xc9ligibles cr\xe9dit')
  html+=kpiCard('','&#11088;',g.total>0?g.moyenne:null,'Score moyen agricole')
  html+=kpiCard('kpi-amber','&#127807;',kpis.productions||null,'Productions enregistr\xe9es')
  html+=kpiCard('kpi-purple','&#128300;',diagTotal||null,'Diagnostics cumul\xe9s')

  } else {
    html+='<div class="charts-grid" style="margin-bottom:16px"><div class="chart-card"><div class="chart-title">Score moyen par r\xe9gion</div><div class="chart-wrap"><canvas id="cScoreReg"></canvas></div></div><div class="chart-card"><div class="chart-title">Taux d\'\xe9ligibilit\xe9 cr\xe9dit (%)</div><div class="chart-wrap"><canvas id="cEligReg"></canvas></div></div></div>'
    html+='<div class="table-card" style="margin-bottom:28px"><div class="table-head"><span class="table-title">D\xe9tail par r\xe9gion</span></div><table><thead><tr><th>R\xe9gion</th><th>Agriculteurs</th><th>\xc9ligibles</th><th>Score moyen</th><th>Taux \xe9ligibilit\xe9</th></tr></thead><tbody>'
    regions.forEach(function(r){
      var col=r.taux_eligible>=50?'var(--vert2)':r.taux_eligible>=25?'var(--amber)':'var(--red)'
      html+='<tr><td><strong>'+esc(r.region)+'</strong></td><td style="font-family:\'DM Mono\',monospace">'+r.total+'</td><td><span class="badge b-blue">'+r.eligible+'</span></td><td><strong style="font-family:\'DM Mono\',monospace">'+r.moyenne+'</strong></td><td><div class="score-row"><div class="score-bar"><div class="score-fill" style="width:'+r.taux_eligible+'%;background:'+col+'"></div></div><span class="score-num">'+r.taux_eligible+'%</span></div></td></tr>'
    })
    html+='</tbody></table></div>'
  }
  html+='<div class="subsection-label">Cultures les plus pratiqu\xe9es</div>'
  if (topC.length===0) {
    html+='<div class="info-banner">&#127807; Aucune production enregistr\xe9e pour le moment.</div>'
  } else {
    var totalP=topC.reduce(function(s,c){return s+c.total},0)||1
    html+='<div class="charts-grid" style="margin-bottom:16px"><div class="chart-card"><div class="chart-title">Volumes par culture</div><div class="chart-wrap"><canvas id="cCultsOng"></canvas></div></div><div class="chart-card"><div class="chart-title">Part relative (top 6)</div><div class="chart-wrap"><canvas id="cCultDonut"></canvas></div></div></div>'
    html+='<div class="table-card" style="margin-bottom:28px"><div class="table-head"><span class="table-title">D\xe9tail — '+topC.length+' cultures</span></div><table><thead><tr><th>#</th><th>Culture</th><th>Productions</th><th>Part</th></tr></thead><tbody>'
    topC.forEach(function(c,i){var pct=Math.round(c.total/totalP*100);html+='<tr><td style="color:var(--muted);font-size:12px">'+(i+1)+'</td><td><strong>'+esc(c.name)+'</strong></td><td style="font-family:\'DM Mono\',monospace;font-weight:700">'+c.total+'</td><td><div class="score-row"><div class="score-bar"><div class="score-fill" style="width:'+pct+'%;background:var(--vert2)"></div></div><span class="score-num">'+pct+'%</span></div></td></tr>'})
    html+='</tbody></table></div>'
  }
  html+='<div class="subsection-label">Sant\xe9 phytosanitaire</div>'
  if (diagTotal===0) { html+='<div class="info-banner">&#128737;&#65039; Aucun diagnostic effectu\xe9 pour le moment.</div>' }
  else if (vuln.length===0) { html+='<div class="info-banner">&#9989; Aucune maladie identifi\xe9e dans les '+diagTotal+' diagnostics.</div>' }
  else {
    var urgHigh=vuln.filter(function(v){return v.urgency==='\xc9lev\xe9e'})
    if (urgHigh.length>0) html+='<div class="alerte-strip"><div class="alerte-icon">&#128680;</div><div><div class="alerte-title">'+urgHigh.length+' maladie'+(urgHigh.length>1?'s':'')+' \xe0 urgence \xe9lev\xe9e — intervention recommand\xe9e</div><div class="alerte-desc">'+urgHigh.slice(0,3).map(function(v){return v.name}).join(', ')+'</div></div></div>'
    html+='<div class="charts-grid" style="margin-bottom:16px"><div class="chart-card"><div class="chart-title">Top maladies / ravageurs</div><div class="chart-wrap"><canvas id="cVulnBar"></canvas></div></div><div class="chart-card"><div class="chart-title">R\xe9partition par niveau d\'urgence</div><div class="chart-wrap"><canvas id="cVulnUrg"></canvas></div></div></div>'
    html+='<div class="table-card"><div class="table-head"><span class="table-title">D\xe9tail des menaces ('+vuln.length+')</span></div><table><thead><tr><th>#</th><th>Maladie / Ravageur</th><th>Cas</th><th>Urgence</th><th>Cultures touch\xe9es</th></tr></thead><tbody>'
    vuln.forEach(function(m,i){html+='<tr><td style="color:var(--muted);font-size:12px">'+(i+1)+'</td><td><strong>'+esc(m.name)+'</strong></td><td style="font-family:\'DM Mono\',monospace;font-weight:700">'+m.count+'</td><td>'+urgBadge(m.urgency)+'</td><td style="font-size:12px;color:var(--muted)">'+((m.cultures||[]).join(', ')||'—')+'</td></tr>'})
    html+='</tbody></table></div>'
  }
  document.getElementById('mainContent').innerHTML=html
  setTimeout(function(){
    if(regions.length){mkChart('cScoreReg',{type:'bar',data:{labels:regions.map(function(r){return r.region}),datasets:[{label:'Score',data:regions.map(function(r){return r.moyenne}),backgroundColor:'#36AF3B',borderRadius:7}]},options:axisOpts({legend:false})});mkChart('cEligReg',{type:'bar',data:{labels:regions.map(function(r){return r.region}),datasets:[{label:'%',data:regions.map(function(r){return r.taux_eligible}),backgroundColor:'#2471A3',borderRadius:7}]},options:axisOpts({max:100,legend:false})})}
    if(topC.length){mkChart('cCultsOng',{type:'bar',data:{labels:topC.map(function(c){return c.name}),datasets:[{label:'Productions',data:topC.map(function(c){return c.total}),backgroundColor:greenPalette(topC.length),borderRadius:7}]},options:axisOpts({legend:false})});mkChart('cCultDonut',{type:'doughnut',data:{labels:topC.slice(0,6).map(function(c){return c.name}),datasets:[{data:topC.slice(0,6).map(function(c){return c.total}),backgroundColor:greenPalette(6),borderWidth:2,borderColor:'#fff'}]},options:donutOpts()})}
    if(vuln.length){var top8=vuln.slice(0,8);mkChart('cVulnBar',{type:'bar',data:{labels:top8.map(function(m){return m.name.length>22?m.name.slice(0,22)+'…':m.name}),datasets:[{data:top8.map(function(m){return m.count}),backgroundColor:top8.map(function(m){return URGCOL[m.urgency]||'#aaa'}),borderRadius:6}]},options:horzOpts()});var urgMap={};vuln.forEach(function(m){var k=m.urgency||'Inconnue';urgMap[k]=(urgMap[k]||0)+m.count});mkChart('cVulnUrg',{type:'doughnut',data:{labels:Object.keys(urgMap),datasets:[{data:Object.values(urgMap),backgroundColor:Object.keys(urgMap).map(function(k){return URGCOL[k]||'#aaa'}),borderWidth:2,borderColor:'#fff'}]},options:donutOpts()})}
  }, 80)
}

  html+='<select class="filter-select" id="filterCateg" onchange="filterFormations()"><option value="">Toutes cat\xe9gories</option>'+Object.keys(cats).sort().map(function(c){return'<option value="'+esc(c)+'">'+esc(c)+'</option>'}).join('')+'</select>'

  html+='</div></div><table><thead><tr><th>#</th><th>Titre</th><th>Organisme</th><th>Ville</th><th>Cat\xe9gorie</th><th>Prix</th><th>Certifiante</th><th>D\xe9but</th></tr></thead><tbody id="formationsBody"></tbody></table>'
  html+='<div class="table-foot"><span class="table-info" id="fInfo"></span><div class="pagination" id="fPag"></div></div></div>'
  document.getElementById('mainContent').innerHTML=html
  filteredRows=list.slice();currentPage=1
  setTimeout(function(){
    if(tr.by_categorie&&tr.by_categorie.length)mkChart('cFCateg',{type:'bar',data:{labels:tr.by_categorie.map(function(x){return x.name}),datasets:[{data:tr.by_categorie.map(function(x){return x.total}),backgroundColor:greenPalette(tr.by_categorie.length),borderRadius:7}]},options:axisOpts({legend:false})})
    if(tr.by_ville&&tr.by_ville.length)mkChart('cFVille',{type:'bar',data:{labels:tr.by_ville.map(function(x){return x.name}),datasets:[{data:tr.by_ville.map(function(x){return x.total}),backgroundColor:'#2471A3',borderRadius:7}]},options:horzOpts()})
    var payantes=(tr.total||0)-(tr.gratuites||0)
    mkChart('cFGrat',{type:'doughnut',data:{labels:['Gratuites','Payantes'],datasets:[{data:[tr.gratuites||0,payantes],backgroundColor:['#36AF3B','#2471A3'],borderWidth:2,borderColor:'#fff'}]},options:donutOpts()})

function filterFormations() {
  var q=(document.getElementById('searchFormations')||{value:''}).value.toLowerCase()
  var cat=(document.getElementById('filterCateg')||{value:''}).value
  var grat=(document.getElementById('filterGrat')||{value:''}).value
  var all=((DATA.ong&&DATA.ong.trainings&&DATA.ong.trainings.list)||[])
  filteredRows=all.filter(function(t){var mQ=!q||(t.title||'').toLowerCase().includes(q)||(t.organisme||'').toLowerCase().includes(q)||(t.ville||'').toLowerCase().includes(q);var mC=!cat||t.categorie===cat;var mG=!grat||(grat==='free'&&t.is_free)||(grat==='paid'&&!t.is_free);return mQ&&mC&&mG})
  currentPage=1;renderFormationsTable()
}
function renderFormationsTable() {
  var total=filteredRows.length,pages=Math.ceil(total/PAGE_SIZE)||1
  currentPage=Math.min(currentPage,pages)
  var slice=filteredRows.slice((currentPage-1)*PAGE_SIZE,currentPage*PAGE_SIZE)
  var body=document.getElementById('formationsBody');if(!body)return
  body.innerHTML=slice.length===0?'<tr><td colspan="8" style="text-align:center;padding:28px;color:var(--muted)">Aucun r\xe9sultat</td></tr>':slice.map(function(t,i){var idx=(currentPage-1)*PAGE_SIZE+i+1;var prix=t.is_free?'<span class="badge b-green">Gratuite</span>':(t.prix?'<span class="formation-prix">'+fmtN(t.prix)+' FCFA</span>':'<span style="color:var(--muted)">N/A</span>');var cert=t.is_certifiante?'<span class="badge b-purple">&#127941; Oui</span>':'<span style="color:var(--muted);font-size:12px">—</span>';var debut=t.date_debut?new Date(t.date_debut).toLocaleDateString('fr-FR'):'—';return'<tr><td style="color:var(--muted);font-size:12px">'+idx+'</td><td><strong>'+esc(t.title||'')+'</strong></td><td style="font-size:12px;color:var(--muted)">'+esc(t.organisme||'—')+'</td><td><span class="badge b-blue">'+esc(t.ville||'—')+'</span></td><td style="font-size:12px">'+esc(t.categorie||'—')+'</td><td>'+prix+'</td><td>'+cert+'</td><td style="font-family:\'DM Mono\',monospace;font-size:12px">'+debut+'</td></tr>'}).join('')
  document.getElementById('fInfo').textContent=total+' formation'+(total>1?'s':'')+' — page '+currentPage+'/'+pages
  buildPagination('fPag',pages,'formations')
}

// ── PAGINATION ────────────────────────────────────────────────────────────────
function buildPagination(cid,pages,ctx) {
  var pag=document.getElementById(cid);if(!pag)return;pag.innerHTML=''
  if(currentPage>1)addPageBtn(pag,'‹',currentPage-1,false,ctx)
  for(var p=Math.max(1,currentPage-2);p<=Math.min(pages,currentPage+2);p++)addPageBtn(pag,p,p,p===currentPage,ctx)
  if(currentPage<pages)addPageBtn(pag,'›',currentPage+1,false,ctx)
}
function addPageBtn(container,label,page,active,ctx) {
  var b=document.createElement('button');b.className='page-btn'+(active?' active':'');b.textContent=label
  var p=page;b.onclick=function(){currentPage=p;renderFormationsTable()}
  if(active)b.disabled=true;container.appendChild(b)
}

// ── LOGOUT ────────────────────────────────────────────────────────────────────
function logout() {
  sessionStorage.removeItem('ong_token');sessionStorage.removeItem('ong_user')
  TOKEN=null;USER=null;DATA=null;killCharts()
  document.getElementById('loginScreen').style.display='flex'
  document.getElementById('app').style.display='none'
  document.getElementById('username').value='';document.getElementById('password').value=''
  document.getElementById('loginError').textContent=''
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function fmtN(n)      { return n!=null?Number(n).toLocaleString('fr-FR'):'—' }
function fmtDate(iso) { return iso?new Date(iso).toLocaleString('fr-FR',{dateStyle:'short',timeStyle:'short'}):'—' }
function esc(s)       { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function kpiCard(cls,icon,val,label,suffix) {
  var display=(val===null||val===undefined||val===''||val===0&&label.includes('Score'))?'—':fmtN(val)+(suffix||'')
  if(val===0&&!label.includes('Score'))display='0'
  return '<div class="kpi-card '+(cls||'')+'"><div class="kpi-icon">'+icon+'</div><div class="kpi-value">'+display+'</div><div class="kpi-label">'+label+'</div></div>'
}
function urgBadge(u) { var m={'\xc9lev\xe9e':'b-red','Mod\xe9r\xe9e':'b-amber','Faible':'b-green'};return '<span class="badge '+(m[u]||'b-gray')+'">'+esc(u||'—')+'</span>' }
